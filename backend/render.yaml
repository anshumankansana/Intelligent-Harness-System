services:
  - type: web
    name: intelligent-harness-system
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DEFAULT_PROVIDER
        value: groq
      - key: CORS_ORIGINS
        value: https://intelligent-harness-system-12345.vercel.app,http://localhost:3000
      - key: GITHUB_TOKEN
        sync: false
      - key: VERCEL_TOKEN
        sync: false
      - key: VERCEL_SCOPE
        sync: false
      - key: WORKSPACE_ROOT
        value: ../workspace
